services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Prisma Migrate ─────────────────────────────────────────────────────────
  # Runs migrations once on startup then exits. API and Worker wait for it.
  migrate:
    container_name: sentinel_migrate
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      [
        "node",
        "-e",
        "require('child_process').execSync('npx prisma migrate deploy', { stdio: 'inherit', cwd: '/app/packages/db' })",
      ]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sentinel_net
    restart: "no"

  # ─── Express API ────────────────────────────────────────────────────────────
  api:
    container_name: sentinel_api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3001"
    networks:
      - sentinel_net

  # ─── BullMQ Worker ──────────────────────────────────────────────────────────
  worker:
    container_name: sentinel_worker
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - sentinel_net

  # ─── Nginx ─────────────────────────────────────────
  #   Stage 1 → pnpm build ile React SPA'yı derler
  #   Stage 2 → dist/ dosyalarını nginx:alpine image'ına gömer
  nginx:
    container_name: sentinel_nginx
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - sentinel_net

volumes:
  postgres_data:
  redis_data:

networks:
  sentinel_net:
    driver: bridge
