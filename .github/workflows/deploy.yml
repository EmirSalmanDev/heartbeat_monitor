name: CI / Build

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Type-check and build all packages ────────────────────────────────
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sentinel/shared build

      - name: Generate Prisma client
        run: pnpm --filter @sentinel/db exec prisma generate

      - name: Build all apps
        run: pnpm -r build

  # ── Job 2: Build Docker images ──────────────────────────────────────────────
  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build \
            -t sentinel-api:${{ github.sha }} \
            -f apps/api/Dockerfile .

      - name: Build Worker image
        run: |
          docker build \
            -t sentinel-worker:${{ github.sha }} \
            -f apps/worker/Dockerfile .

      - name: Build Nginx + Web image
        run: |
          docker build \
            -t sentinel-web:${{ github.sha }} \
            -f apps/web/Dockerfile .

  # ── Job 3: Run Prisma migrations against production DB ──────────────────────
  # Runs only after images build cleanly, on pushes to main.
  migrate:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sentinel/db exec prisma generate

      - name: Deploy migrations
        run: pnpm --filter @sentinel/db migrate:deploy

  # ── Deployment note ─────────────────────────────────────────────────────────
  # Actual server deployment (pulling new images and restarting containers)
  # requires SSH access to the production host and is intentionally left as a
  # manual step. To automate it, add a job that uses appleboy/ssh-action@v1 to
  # SSH into the server and run:
  #   docker compose pull && docker compose up -d --remove-orphans
  # You will need to:
  #   1. Push images to a registry (GHCR or Docker Hub) in build-images
  #   2. Add SSH_HOST, SSH_USER, SSH_PRIVATE_KEY secrets to the repository
