name: CI / Build

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Type-check and build all packages ────────────────────────────────
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sentinel/shared build

      - name: Generate Prisma client
        run: pnpm --filter @sentinel/db exec prisma generate

      - name: Build all apps
        run: pnpm -r build

  # ── Job 2: Build Docker images ──────────────────────────────────────────────
  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: |
          docker build \
            -t sentinel-api:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/sentinel-api:${{ github.sha }} \
            -f apps/api/Dockerfile .

      - name: Build Worker image
        run: |
          docker build \
            -t sentinel-worker:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/sentinel-worker:${{ github.sha }} \
            -f apps/worker/Dockerfile .

      - name: Build Nginx + Web image
        run: |
          docker build \
            -t sentinel-web:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/sentinel-web:${{ github.sha }} \
            -f apps/web/Dockerfile .

      - name: Push API image
        run: docker push ghcr.io/${{ github.repository_owner }}/sentinel-api:${{ github.sha }}

      - name: Push Worker image
        run: docker push ghcr.io/${{ github.repository_owner }}/sentinel-worker:${{ github.sha }}

      - name: Push Nginx + Web image
        run: docker push ghcr.io/${{ github.repository_owner }}/sentinel-web:${{ github.sha }}

  # ── Job 3: Run Prisma migrations against production DB ──────────────────────
  # Runs only after images build cleanly, on pushes to main.
  migrate:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sentinel/db exec prisma generate

      - name: Deploy migrations
        run: pnpm --filter @sentinel/db migrate:deploy

  # ── Job 4: Deploy to production ─────────────────────────────────────────────
  # Required repository secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker compose pull
            docker compose up -d --remove-orphans
