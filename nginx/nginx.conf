events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Rate limiting zone — keyed by client IP
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  server {
    listen 80;

    # Serve React SPA static files
    location / {
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;   # SPA client-side routing fallback
    }

    # Proxy API requests to Express
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://api:3001/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # CORS — not needed: React and API share same origin via Nginx
    }

    # Prometheus scrape endpoint — internal Docker network only
    location /metrics {
      allow 172.0.0.0/8;   # Docker bridge network
      deny  all;
      proxy_pass http://api:3001/metrics;
    }
  }
}
